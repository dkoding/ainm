name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Verify release gate
        run: python scripts/verify_release_gate.py
      - name: Ensure generated reports are committed
        run: git diff --exit-code coverage_report.json competition_dashboard.json
